      tags: [Image Generation]
      requestBody:
        $ref: '#/components/requestBodies/ImageGenerationRequest'
      responses:
        '200':
          description: Task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
  /v1/ai/hyperflux:
    post:
      summary: Generate image with HyperFlux
      operationId: generateHyperflux
      tags: [Image Generation]
      requestBody:
        $ref: '#/components/requestBodies/ImageGenerationRequest'
      responses:
        '200':
          description: Task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
  /v1/ai/seedream-v4-5:
    post:
      summary: Generate image with Seedream v4.5
      operationId: generateSeedream
      tags: [Image Generation]
      requestBody:
        $ref: '#/components/requestBodies/ImageGenerationRequest'
      responses:
        '200':
          description: Task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
  /v1/ai/runway:
    post:
      summary: Generate image with Runway
      operationId: generateRunway
      tags: [Image Generation]
      requestBody:
        $ref: '#/components/requestBodies/ImageGenerationRequest'
      responses:
        '200':
          description: Task accepted.
          content:
