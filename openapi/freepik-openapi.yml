openapi: 3.1.0
info:
  title: Freepik / Magnific API
  description: >-
    Freepik's developer platform (operated through Magnific) provides AI-powered
    image generation, video generation, image editing, audio generation, and
    access to Freepik's stock library of vectors, photos, icons, and templates.
    Asynchronous tasks are polled by task ID.
  version: '1.0'
  contact:
    name: Freepik / Magnific
    url: https://docs.freepik.com/
servers:
  - url: https://api.magnific.com
    description: Magnific API (Freepik developer platform)
tags:
  - name: Image Generation
    description: Generate images from text or reference inputs.
  - name: Video Generation
    description: Generate video from images or text.
  - name: Image Editing
    description: Upscale, relight, restyle, or edit images.
  - name: Audio
    description: Generate music and sound effects.
  - name: Resources
    description: Search Freepik's stock library.
  - name: Tasks
    description: Poll asynchronous task status.
paths:
  /v1/resources:
    get:
      summary: Search stock resources
      description: Search Freepik's stock library of vectors, photos, icons, and templates.
      operationId: listResources
      tags:
        - Resources
      parameters:
        - name: Accept-Language
          in: header
          schema:
            type: string
            default: en-US
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
        - name: term
          in: query
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
            enum: [relevance, recent]
            default: relevance
        - name: filters
          in: query
          schema:
            type: string
          description: Advanced filters (orientation, content_type, license, color, author, ai-generated, vector, psd, people).
      responses:
        '200':
          description: Resources listing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceList'
  /v1/ai/mystic:
    post:
      summary: Generate image with Mystic
      operationId: generateMystic
      tags:
        - Image Generation
      requestBody:
        $ref: '#/components/requestBodies/ImageGenerationRequest'
      responses:
        '200':
          description: Task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
  /v1/ai/flux-2-pro:
    post:
      summary: Generate image with Flux 2 Pro
      operationId: generateFlux2Pro
      tags: [Image Generation]
      requestBody:
        $ref: '#/components/requestBodies/ImageGenerationRequest'
      responses:
        '200':
          description: Task accepted.
          content:
