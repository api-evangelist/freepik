      requestBody:
        $ref: '#/components/requestBodies/ImageEditingRequest'
      responses:
        '200':
          description: Task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
  /v1/ai/image-expand:
    post:
      summary: Expand image
      operationId: imageExpand
      tags: [Image Editing]
      requestBody:
        $ref: '#/components/requestBodies/ImageEditingRequest'
      responses:
        '200':
          description: Task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
  /v1/ai/music-generation:
    post:
      summary: Generate music
      operationId: generateMusic
      tags: [Audio]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
      responses:
        '200':
          description: Task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
    get:
      summary: List music generation tasks
      operationId: listMusicTasks
      tags: [Audio]
      responses:
        '200':
          description: Music tasks list.
          content:
            application/json:
              schema:
                type: object
  /v1/ai/sound-effects:
    post:
      summary: Generate sound effects
      operationId: generateSoundEffects
      tags: [Audio]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
      responses:
        '200':
          description: Task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
  /v1/ai/audio-isolation:
    post:
      summary: Audio isolation from audio or video
      operationId: audioIsolation
      tags: [Audio]
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
  /v1/ai/{endpoint}/{taskId}:
    get:
      summary: Poll task status
      operationId: getTask
      tags: [Tasks]
      parameters:
        - name: endpoint
          in: path
          required: true
          schema:
            type: string
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
components:
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: x-magnific-api-key
  requestBodies:
    ImageGenerationRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              prompt:
                type: string
              aspect_ratio:
                type: string
              num_images:
                type: integer
              webhook_url:
                type: string
                format: uri
    VideoGenerationRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              image:
                type: string
                description: Image URL or base64.
              prompt:
                type: string
              duration:
                type: integer
              webhook_url:
                type: string
                format: uri
    ImageEditingRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              image:
                type: string
                description: Image URL or base64.
              webhook_url:
                type: string
                format: uri
  schemas:
    TaskResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            task_id:
              type: string
            status:
              type: string
              enum: [CREATED, IN_PROGRESS, COMPLETED, FAILED]
            generated:
              type: array
              items:
                type: string
                format: uri
    Resource:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        url:
          type: string
          format: uri
        filename:
          type: string
        licenses:
          type: array
          items:
            type: object
        image:
          type: object
        author:
          type: object
        stats:
          type: object
    ResourceList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        meta:
          type: object
security:
  - ApiKey: []
