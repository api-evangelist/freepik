naftiko: 1.0.0-alpha2
info:
  label: Freepik / Magnific API — Resources
  description: 'Freepik / Magnific API — Resources. 1 operations. Lead operation: Search stock resources. Self-contained Naftiko
    capability covering one Freepik business surface.'
  tags:
  - Freepik
  - Resources
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FREEPIK_API_KEY: FREEPIK_API_KEY
capability:
  consumes:
  - type: http
    namespace: freepik-resources
    baseUri: https://api.magnific.com
    description: Freepik / Magnific API — Resources business capability. Self-contained, no shared references.
    resources:
    - name: v1-resources
      path: /v1/resources
      operations:
      - name: listresources
        method: GET
        description: Search stock resources
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Accept-Language
          in: header
          type: string
        - name: page
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: term
          in: query
          type: string
        - name: order
          in: query
          type: string
        - name: filters
          in: query
          type: string
          description: Advanced filters (orientation, content_type, license, color, author, ai-generated, vector, psd, people).
    authentication:
      type: apikey
      key: x-magnific-api-key
      value: '{{env.FREEPIK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: freepik-resources-rest
    port: 8080
    description: REST adapter for Freepik / Magnific API — Resources. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/resources
      name: v1-resources
      description: REST surface for v1-resources.
      operations:
      - method: GET
        name: listresources
        description: Search stock resources
        call: freepik-resources.listresources
        with:
          Accept-Language: rest.Accept-Language
          page: rest.page
          limit: rest.limit
          term: rest.term
          order: rest.order
          filters: rest.filters
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: freepik-resources-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freepik / Magnific API — Resources. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-stock-resources
      description: Search stock resources
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: freepik-resources.listresources
      with:
        Accept-Language: tools.Accept-Language
        page: tools.page
        limit: tools.limit
        term: tools.term
        order: tools.order
        filters: tools.filters
      outputParameters:
      - type: object
        mapping: $.
