naftiko: 1.0.0-alpha2
info:
  label: Freepik / Magnific API
  description: Freepik's developer platform (operated through Magnific) provides AI-powered image generation, video generation,
    image editing, audio generation, and access to Freepik's stock library of vectors, photos, icons, and templates. Asynchronous
    tasks are polled by task ID.
  tags:
  - Freepik
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: freepik
    baseUri: https://api.magnific.com
    description: Freepik / Magnific API HTTP API.
    authentication:
      type: apikey
      in: header
      name: x-magnific-api-key
      value: '{{FREEPIK_TOKEN}}'
    resources:
    - name: v1-resources
      path: /v1/resources
      operations:
      - name: listresources
        method: GET
        description: Search stock resources
        inputParameters:
        - name: Accept-Language
          in: header
          type: string
        - name: page
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: term
          in: query
          type: string
        - name: order
          in: query
          type: string
        - name: filters
          in: query
          type: string
          description: Advanced filters (orientation, content_type, license, color, author, ai-generated, vector, psd, people).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-ai-mystic
      path: /v1/ai/mystic
      operations:
      - name: generatemystic
        method: POST
        description: Generate image with Mystic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
